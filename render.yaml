services:
  - type: web
    name: blogproject-api
    runtime: docker
    repo: https://github.com/NevilPatel1292/blogproject
    rootDir: backend
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__BlogprojContext
        sync: false
  - type: web
    name: blogproject-frontend
    runtime: static
    repo: https://github.com/NevilPatel1292/blogproject
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./frontend/build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_BASE_URL
        sync: false
