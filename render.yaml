services:
  - type: web
    name: blogproject-api
    runtime: docker
    repo: https://github.com/NevilPatel1292/blogproject
    rootDir: backend
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__BlogprojContext
        fromDatabase:
          name: blogproject-db
          property: connectionString
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:10000
  - type: web
    name: blogproject-frontend
    runtime: static
    repo: https://github.com/NevilPatel1292/blogproject
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_BASE_URL
        sync: false
databases:
  - name: blogproject-db
    plan: free
    databaseName: blogproj
    user: blogproj
